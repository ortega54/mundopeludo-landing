# Publica solo la web (HTML/CSS/imágenes/media) en la rama gh-pages
# e intenta activar GitHub Pages apuntando a esa rama (API).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Carpeta pública del sitio
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll
          cp -r images media _site/

      - name: Subir a la rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true

      - name: Activar GitHub Pages (rama gh-pages)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/gh-pages-api.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages" \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}') || true
          echo "POST /pages -> HTTP ${HTTP_CODE}"
          cat /tmp/gh-pages-api.json 2>/dev/null || true
          if [ "$HTTP_CODE" = "409" ] || [ "$HTTP_CODE" = "422" ]; then
            echo "Intentando PATCH (sitio ya existía o conflicto)..."
            curl -sS -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/pages" \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}' \
              || true
          fi
