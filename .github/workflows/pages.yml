# 1) Sube solo la web a la rama gh-pages
# 2) Borra la config anterior de Pages si existía (p. ej. solo Actions)
# 3) Crea Pages desde la rama gh-pages (origen "legacy")
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Carpeta pública del sitio
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll
          cp -r images media _site/

      - name: Publicar rama gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true

      - name: Reiniciar Pages (borrar y crear desde gh-pages)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Eliminando configuración Pages previa (si existe)..."
          DEL_CODE=$(curl -sS -o /tmp/del.json -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages") || true
          echo "DELETE /pages -> HTTP ${DEL_CODE}"
          cat /tmp/del.json 2>/dev/null || true
          sleep 8
          echo "Creando Pages desde rama gh-pages..."
          POST_CODE=$(curl -sS -o /tmp/post.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages" \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}') || true
          echo "POST /pages -> HTTP ${POST_CODE}"
          cat /tmp/post.json 2>/dev/null || true
