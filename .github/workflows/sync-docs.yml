# Mantiene /docs igual que la raíz (index, CSS, images, media) para GitHub Pages.
# En Settings → Pages elige: rama main, carpeta /docs
name: Sync docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, 'chore: sincronizar docs') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copiar sitio a docs/
        run: |
          mkdir -p docs
          cp index.html styles.css docs/
          cp .nojekyll docs/ 2>/dev/null || touch docs/.nojekyll
          rm -rf docs/images docs/media
          cp -r images media docs/

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "docs/ ya está actualizado"
          else
            git commit -m "chore: sincronizar docs para GitHub Pages"
            git push
          fi
